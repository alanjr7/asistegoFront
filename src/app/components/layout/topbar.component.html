<div class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0">
  <div>
    <h2 class="text-lg font-semibold text-gray-900 leading-tight">{{ state.getTitulo() }}</h2>
    <p class="text-xs text-gray-500">Santa Cruz, Bolivia</p>
  </div>

  <div class="flex items-center gap-4">
    <div class="relative w-80">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="w-full pl-9 pr-3 py-2 border border-gray-200 rounded-lg bg-gray-50 text-sm text-gray-900 placeholder-gray-400 outline-none focus:border-blue-600 focus:bg-white transition-colors" placeholder="Buscar clientes, servicios..." />
    </div>

    <button class="relative p-2 rounded-lg border-0 bg-transparent text-gray-600 cursor-pointer flex items-center justify-center transition-colors hover:bg-gray-100" (click)="state.navigateTo('notificaciones')">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span *ngIf="state.notificacionesNoLeidas() > 0" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center">
        {{ state.notificacionesNoLeidas() }}
      </span>
    </button>

    <button class="relative p-2 rounded-lg border-0 bg-transparent text-gray-600 cursor-pointer flex items-center justify-center transition-colors hover:bg-gray-100" (click)="state.navigateTo('perfil')" title="Perfil del Taller">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</div>
