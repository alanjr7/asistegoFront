<div class="topbar">
  <div class="topbar-left">
    <h2 class="topbar-title">{{ state.getTitulo() }}</h2>
    <p class="topbar-subtitle">Santa Cruz, Bolivia</p>
  </div>

  <div class="topbar-right">
    <div class="search-wrapper">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" placeholder="Buscar clientes, servicios..." />
    </div>

    <button class="icon-btn" (click)="state.navigateTo('notificaciones')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span *ngIf="state.notificacionesNoLeidas() > 0" class="notif-badge">
        {{ state.notificacionesNoLeidas() }}
      </span>
    </button>

    <button class="icon-btn" (click)="state.navigateTo('perfil')" title="Perfil del Taller">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
  </div>
</div>
