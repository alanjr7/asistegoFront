<div class="login-bg">
  <div class="login-card card">
    <!-- Logo -->
    <div class="login-header">
      <div class="login-logo bg-gradient-to-br-blue-green">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <h1>Crear Cuenta</h1>
      <p class="text-sm text-gray-500">Regístrate en AsisteGO</p>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="handleSubmit()" class="login-form">
      <div class="form-group">
        <label class="label">Nombre completo</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <input type="text" [(ngModel)]="nombre" name="nombre" class="input pl-input" placeholder="Tu nombre" required />
        </div>
      </div>

      <div class="form-group">
        <label class="label">Correo electrónico</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" [(ngModel)]="email" name="email" class="input pl-input" placeholder="tu@email.com" required />
        </div>
      </div>

      <div class="form-group">
        <label class="label">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" [(ngModel)]="password" name="password" class="input pl-input" placeholder="••••••••" required />
        </div>
      </div>

      <div class="form-group">
        <label class="label">Confirmar contraseña</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" class="input pl-input" placeholder="••••••••" required />
        </div>
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading">
        <span *ngIf="!loading">Crear Cuenta</span>
        <span *ngIf="loading">Creando cuenta...</span>
      </button>
    </form>

    <p class="register-text">
      ¿Ya tienes una cuenta?
      <button type="button" class="forgot-link" (click)="navigateToLogin()">Inicia sesión aquí</button>
    </p>
  </div>
</div>
