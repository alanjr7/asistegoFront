<!-- Login / Registro -->
<app-login-view *ngIf="!state.isAuthenticated() && state.currentView() === 'login'"></app-login-view>
<app-register-view *ngIf="!state.isAuthenticated() && state.currentView() === 'register'"></app-register-view>

<!-- App principal -->
<div *ngIf="state.isAuthenticated()" class="h-screen flex bg-gray-50 overflow-hidden">
  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Contenido principal -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <app-topbar></app-topbar>

    <div class="flex-1 overflow-auto flex flex-col">
      <app-dashboard-view    *ngIf="state.currentView() === 'dashboard'"></app-dashboard-view>
      <app-seguimiento-view  *ngIf="state.currentView() === 'seguimiento'"></app-seguimiento-view>
      <app-chat-view         *ngIf="state.currentView() === 'chat'"></app-chat-view>
      <app-pagos-view        *ngIf="state.currentView() === 'pagos'"></app-pagos-view>
      <app-repuestos-view    *ngIf="state.currentView() === 'repuestos'"></app-repuestos-view>
      <app-clientes-view     *ngIf="state.currentView() === 'clientes'"></app-clientes-view>
      <app-historial-view    *ngIf="state.currentView() === 'historial'"></app-historial-view>
      <app-notificaciones-view *ngIf="state.currentView() === 'notificaciones'"></app-notificaciones-view>
      <app-personal-view     *ngIf="state.currentView() === 'personal'"></app-personal-view>
      <app-perfil-taller-view *ngIf="state.currentView() === 'perfil'"></app-perfil-taller-view>
      <app-grua-view         *ngIf="state.currentView() === 'gruas'"></app-grua-view>
    </div>
  </div>

  <!-- Widget IA flotante -->
  <app-ia-widget></app-ia-widget>

  <!-- Modal de calificación -->
  <app-calificacion-modal *ngIf="state.showCalificacionModal() && state.servicioParaCalificar()"></app-calificacion-modal>
</div>
